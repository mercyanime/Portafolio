<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joe Andre Villacres Guevara | Mercy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        oscuro: '#0F051E',
                        morado: '#4B2E7A',
                        rosa: '#FF4A6E',
                        rojo: '#FF2E4C',
                        transparente: 'rgba(15, 5, 30, 0.45)',
                        marco: 'rgba(130, 160, 255, 0.6)'
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .fondo-imagen {
                background-image: url('https://i.imgur.com/7xQZ8yL.jpg');
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
            }
            .caja-transparente {
                background-color: rgba(15, 5, 30, 0.5);
                backdrop-filter: blur(8px);
                border: 1px solid rgba(255, 255, 255, 0.15);
            }
            .marco-boton {
                border: 1px solid rgba(130, 160, 255, 0.7);
                background-color: rgba(75, 46, 122, 0.3);
            }
        }
    </style>
</head>
<body class="fondo-imagen min-h-screen font-sans text-white flex flex-col justify-between p-4 md:p-8">

    <!-- Menú Superior -->
    <div class="marco-boton rounded-md px-4 py-2 inline-block mb-8">
        <nav class="flex gap-4 md:gap-6 text-sm md:text-base">
            <a href="#" class="text-white hover:text-rosa transition">INICIO</a>
            <a href="#" class="text-white hover:text-rosa transition">DISEÑOS</a>
            <a href="#" class="text-white hover:text-rosa transition">HABILIDADES</a>
            <a href="#" class="text-white hover:text-rosa transition">SOBRE MI</a>
        </nav>
    </div>

    <!-- Contenido Principal -->
    <div class="flex flex-col md:flex-row items-start justify-between w-full gap-8">
        
        <!-- Caja de texto Sobre mí -->
        <div class="caja-transparente rounded-lg p-6 w-full md:w-2/3 max-w-lg relative">
            <div class="absolute -left-2 top-6 flex flex-col gap-2">
                <div class="w-2 h-2 rounded-full bg-rojo/60"></div>
                <div class="w-2 h-2 rounded-full bg-rojo/60"></div>
                <div class="w-2 h-2 rounded-full bg-rojo/60"></div>
            </div>

            <h2 class="text-lg font-semibold mb-3">SOBRE MI</h2>
            <p class="text-sm leading-relaxed">
                Soy Joe Andre Villacres Guevara (Mercy) mis habilidades son nivel intermedio, comunicador digital en publicidad, me desempeño mejor en diseño de banners y paginas web con ayuda de la inteligencia artificial.
            </p>

            <div class="absolute -right-2 bottom-6 flex flex-col gap-2">
                <div class="w-2 h-2 rounded-full bg-rojo/60"></div>
                <div class="w-2 h-2 rounded-full bg-rojo/60"></div>
                <div class="w-2 h-2 rounded-full bg-rojo/60"></div>
            </div>
        </div>

        <!-- Foto de perfil -->
        <div class="w-32 h-32 md:w-40 md:h-40 rounded-full overflow-hidden border-2 border-marco shadow-lg">
            <img src="https://i.imgur.com/9xR8wQH.png" alt="Mercy - Joe Andre Villacres Guevara" class="w-full h-full object-cover">
        </div>

    </div>

    <!-- Pie de página: Redes y Contacto -->
    <div class="flex flex-col md:flex-row justify-between items-center w-full mt-12 gap-4">
        
        <!-- Iconos redes -->
        <div class="flex gap-4">
            <a href="#" class="w-10 h-10 rounded-md bg-oscuro/60 flex items-center justify-center hover:bg-morado transition">
                <i class="fa fa-github text-xl"></i>
            </a>
            <a href="#" class="w-10 h-10 rounded-md bg-oscuro/60 flex items-center justify-center hover:bg-morado transition">
                <i class="fa fa-instagram text-xl"></i>
            </a>
            <a href="#" class="w-10 h-10 rounded-md bg-oscuro/60 flex items-center justify-center hover:bg-morado transition">
                <i class="fa fa-paint-brush text-xl"></i>
            </a>
        </div>

        <!-- Contacto -->
        <div class="flex items-center gap-2 text-lg">
            <i class="fa fa-envelope text-rosa"></i>
            <span>Contacto: joeeredarl@gmail.com</span>
        </div>

    </div>

</body>
</html>
